<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Spring - Entrenadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;700&display=swap');

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            font-family: 'Roboto', sans-serif;
            color: #f0f0f0;
        }
        .navbar {
            background: linear-gradient(90deg, #1a1a2e, #16213e) !important;
            border-bottom: 3px solid #0dcaf0;
        }
        .navbar-brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 2px;
            color: #0dcaf0 !important;
        }
        .nav-link { color: #ccc !important; transition: color 0.2s; }
        .nav-link:hover, .nav-link.active { color: #0dcaf0 !important; }

        .card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        .card-header-custom {
            background: linear-gradient(90deg, #0dcaf0, #0aa2c0);
            border-radius: 15px 15px 0 0;
            padding: 1rem 1.5rem;
        }
        .card-header-custom h5 {
            color: #0f2027;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 1px;
            margin: 0;
        }
        .form-label { color: #0dcaf0; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 8px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: #0dcaf0;
            color: #fff;
            box-shadow: 0 0 0 3px rgba(13,202,240,0.25);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.35); }

        .btn-guardar {
            background: linear-gradient(90deg, #0dcaf0, #0aa2c0);
            border: none;
            color: #0f2027;
            font-weight: 700;
            border-radius: 8px;
            padding: 0.6rem 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-guardar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(13,202,240,0.4);
            color: #0f2027;
        }

        .table-dark-custom thead tr th {
            background: linear-gradient(90deg, #0dcaf0, #0aa2c0);
            color: #0f2027;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 1px;
            font-size: 1rem;
            border: none;
            padding: 0.85rem 1rem;
        }
        .table-dark-custom tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.08);
            transition: background 0.2s;
        }
        .table-dark-custom tbody tr:hover { background: rgba(13,202,240,0.08); }
.table-dark-custom td { color: #1a1a2e; vertical-align: middle; padding: 0.85rem 1rem; }
        .badge-id {
            background: rgba(13,202,240,0.15);
            color: #0dcaf0;
            border: 1px solid rgba(13,202,240,0.35);
            border-radius: 6px;
            padding: 3px 10px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .btn-eliminar {
            background: rgba(220,53,69,0.15);
            border: 1px solid rgba(220,53,69,0.4);
            color: #ff6b7a;
            border-radius: 7px;
            padding: 4px 12px;
            transition: all 0.2s;
        }
        .btn-eliminar:hover {
            background: rgba(220,53,69,0.35);
            color: #fff;
            border-color: #dc3545;
        }
        .empty-state { color: rgba(255,255,255,0.35); padding: 3rem 0; text-align: center; }
        .empty-state i { font-size: 3rem; display: block; margin-bottom: 0.75rem; }

        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 2px;
            font-size: 1.1rem;
            color: #0dcaf0;
            border-bottom: 1px solid rgba(13,202,240,0.3);
            padding-bottom: 0.5rem;
            margin-bottom: 1.25rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg shadow-lg">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-trophy-fill me-2"></i>AGENDA SPRING
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <div class="navbar-nav ms-auto gap-1">
                <a class="nav-link px-3" href="/"><i class="bi bi-plus-circle me-1"></i>Registrar Club</a>
                <a class="nav-link px-3" href="/listar"><i class="bi bi-list-ul me-1"></i>Ver Clubs</a>
                <a class="nav-link px-3 active" href="/entrenadores"><i class="bi bi-person-badge me-1"></i>Entrenadores</a>
                <a class="nav-link px-3" href="/asociaciones"><i class="bi bi-building me-1"></i>Asociaciones</a>
                <a class="nav-link px-3" href="/competiciones"><i class="bi bi-award me-1"></i>Competiciones</a>
                <a class="nav-link px-3" href="/jugadores"><i class="bi bi-people me-1"></i>Jugadores</a>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4 mb-5">
    <div class="row g-4">

        <!-- Formulario -->
        <div class="col-lg-4">
            <div class="card">
                <div class="card-header-custom">
                    <h5><i class="bi bi-person-plus me-2"></i>Nuevo Entrenador</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/guardar-entrenador}" th:object="${entrenador}" method="post">
                        <input type="hidden" th:field="*{id}">
                        <div class="mb-3">
                            <label class="form-label">Nombre *</label>
                            <input type="text" class="form-control" th:field="*{nombre}"
                                   placeholder="Ej: Reinaldo" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Apellido *</label>
                            <input type="text" class="form-control" th:field="*{apellido}"
                                   placeholder="Ej: Rueda" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Edad</label>
                            <input type="number" class="form-control" th:field="*{edad}"
                                   min="18" max="100" placeholder="Ej: 55">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nacionalidad</label>
                            <input type="text" class="form-control" th:field="*{nacionalidad}"
                                   placeholder="Ej: Colombiano">
                        </div>
                        <button type="submit" class="btn btn-guardar w-100">
                            <i class="bi bi-save me-2"></i>Guardar Entrenador
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Listado -->
        <div class="col-lg-8">
            <div class="card">
                <div class="card-body p-4">
                    <p class="section-title"><i class="bi bi-people me-2"></i>Entrenadores Registrados</p>

                    <div th:if="${#lists.isEmpty(entrenadores)}" class="empty-state">
                        <i class="bi bi-person-x"></i>
                        No hay entrenadores registrados aún.
                    </div>

                    <div class="table-responsive" th:unless="${#lists.isEmpty(entrenadores)}">
                        <table class="table table-dark-custom mb-0">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre Completo</th>
                                    <th>Edad</th>
                                    <th>Nacionalidad</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="e : ${entrenadores}">
                                    <td><span class="badge-id" th:text="${e.id}"></span></td>
                                    <td class="fw-bold" th:text="${e.nombre + ' ' + e.apellido}"></td>
                                    <td th:text="${e.edad > 0 ? e.edad + ' años' : '-'}"></td>
                                    <td th:text="${e.nacionalidad != null ? e.nacionalidad : '-'}"></td>
                                    <td>
                                        <a th:href="@{/eliminar-entrenador/{id}(id=${e.id})}"
                                           class="btn btn-eliminar btn-sm"
                                           onclick="return confirm('¿Eliminar entrenador?')">
                                            <i class="bi bi-trash"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
